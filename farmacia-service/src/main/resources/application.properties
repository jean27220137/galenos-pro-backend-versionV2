spring.application.name=farmacia-service
server.port=8082

# Oracle — GP_FARMACIA
spring.datasource.url=jdbc:oracle:thin:@//${ORACLE_HOST:localhost}:1521/XEPDB1
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.username=GP_FARMACIA
spring.datasource.password=GpFarmacia1234!
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=GP_FARMACIA

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:galenos}
spring.rabbitmq.password=${RABBITMQ_PASS:Galenos1234!}

# RabbitMQ — nombres de exchange y colas
galenos.rabbitmq.exchange=galenos.exchange
galenos.rabbitmq.cola.solicitud=cola.solicitud.nueva
galenos.rabbitmq.cola.despacho=cola.despacho.confirmado

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logs
logging.level.com.galenospro=INFO
logging.level.org.springframework.amqp=WARN
