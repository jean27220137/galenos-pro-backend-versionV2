server.port=8083
spring.application.name=almacen-service

# Oracle GP_ALMACEN
spring.datasource.url=jdbc:oracle:thin:@//${ORACLE_HOST:localhost}:1521/XEPDB1
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.username=GP_ALMACEN
spring.datasource.password=GpAlmacen1234!
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:galenos}
spring.rabbitmq.password=${RABBITMQ_PASS:Galenos1234!}
galenos.rabbitmq.exchange=galenos.exchange
galenos.rabbitmq.cola.solicitud=cola.solicitud.nueva
galenos.rabbitmq.cola.despacho=cola.despacho.confirmado
galenos.rabbitmq.cola.stock-critico=cola.stock.critico

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
