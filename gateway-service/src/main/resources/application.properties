server.port=8080
spring.application.name=gateway-service

# URLs internas de microservicios (Docker network)
gateway.services.auth=http://localhost:8081
gateway.services.farmacia=http://localhost:8082
gateway.services.almacen=http://localhost:8083

# JWT (mismo secret que auth-service)
jwt.secret=${JWT_SECRET:galenos-pro-v2-dev-secret-key-512bits-replace-in-production-00000000000000000000000000000000}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Rate limiting
gateway.rate-limit.requests-per-minute=100

# CORS
gateway.cors.allowed-origin=http://localhost:4200

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.com.galenospro.gateway=INFO
