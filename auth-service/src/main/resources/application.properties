server.port=8081
spring.application.name=auth-service

# Oracle GP_AUTH
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=GP_AUTH
spring.datasource.password=GpAuth1234!
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:galenos-pro-v2-dev-secret-key-512bits-replace-in-production-00000000000000000000000000000000}
jwt.expiration-minutes=30

# Redis (blacklist tokens)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Actuator
management.endpoints.web.exposure.include=health,info

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
